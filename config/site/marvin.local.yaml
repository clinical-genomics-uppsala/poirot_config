# Marvin site override following the standard config/site layout.

PIPELINE_HOME: /projects/bin/wp3_hg/poirot_rd_wgs/{{PIPELINE_VERSION}}
REFERENCE_DATA_DIR: /projects/cgu/library/references/GRCh38
